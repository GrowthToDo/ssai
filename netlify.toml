[build]
  publish = "dist"
  command = "npm run build"

[build.processing.html]
  pretty_urls = false

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 301 from www subdomain to apex so Google consolidates signals on one host.
[[redirects]]
  from = "https://www.simplescheduleai.com/*"
  to = "https://simplescheduleai.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/blog/healthcare-scheduling-crisis-26000-administrative-burden"
  to = "/blog/healthcare-scheduling-crisis"
  status = 301
  force = true

# Deleted landing pages — redirect to homepage so Google drops the 404s
[[redirects]]
  from = "/landing/*"
  to = "/"
  status = 301
  force = true

# Draft post URL crawled from an old sitemap — redirect to closest live post
[[redirects]]
  from = "/blog/12-hour-hospital-shifts-scheduling"
  to = "/blog/best-nurse-scheduling-software-2026"
  status = 301
  force = true

# Catch-all: return true 404 status for unmatched URLs (prevents soft 404s)
[[redirects]]
  from = "/*"
  to = "/404"
  status = 404
