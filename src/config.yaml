site:
  name: SimpleScheduleAI
  site: 'https://simplescheduleai.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: null

# Default SEO metadata
metadata:
  title:
    default: SimpleScheduleAI
    template: '%s — SimpleScheduleAI'
  description: "Assisted nurse scheduling for Critical Access Hospitals in Texas. Keep your tools, keep control, reduce scheduling load."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: SimpleScheduleAI
    images:
      - url: '~/assets/images/social.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@simplescheduleai'
    site: '@simplescheduleai'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: "G-J2WK4QR3RC"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
